# tagpr: opens/updates a release PR from main; merging it tags main and publishes a GitHub Release.
# After a full semver tag (e.g. v1.0.0), .github/scripts/update-major-signed-tag.sh force-updates the major tag (e.g. v1) with GPG so it shows Verified.
# Secrets: GPG_PRIVATE_KEY (armored secret key), optional GPG_PASSPHRASE. Register the matching public key on GitHub (verified email).
# Repository Settings → Actions → General: enable "Allow GitHub Actions to create and approve pull requests".
name: tagpr

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  tagpr:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: read
    timeout-minutes: 60
    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: tagpr
        name: Run tagpr
        uses: Songmu/tagpr@b3fb89424646b06c8aa460f50307c60b6a541425 # v1.17.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update major semver tag (GPG-signed)
        if: steps.tagpr.outputs.tag != ''
        env:
          TAG: ${{ steps.tagpr.outputs.tag }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/scripts/update-major-signed-tag.sh
